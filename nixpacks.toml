[variables]
    NIXPACKS_NODE_VERSION = "22"
    NIXPACKS_PHP_VERSION = "8.2"
    NODE_ENV = "production"
    APP_ENV = "production"

[phases.setup]
    nixPkgs = ["...", "php82Extensions.pdo_pgsql", "php82Extensions.pdo_mysql", "php82Extensions.bcmath", "php82Extensions.gd", "php82Extensions.intl"]

[phases.install]
    dependsOn = ["setup"]
    cmds = ["composer install --no-dev --optimize-autoloader", "npm install"]

[phases.build]
    dependsOn = ["install"]
    cmds = ["npm run build", "php artisan storage:link", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]
